services:
  emdash:
    build:
      context: .
      dockerfile: Dockerfile
    # Coolify manages networking via Traefik — no ports needed
    environment:
      NODE_ENV: production
      HOST: "0.0.0.0"
      PORT: "4321"
      # Set these in Coolify's Environment Variables panel
      EMDASH_AUTH_SECRET: "${EMDASH_AUTH_SECRET:-change-me-in-production}"
      EMDASH_PREVIEW_SECRET: "${EMDASH_PREVIEW_SECRET:-}"
      # Set to "true" to clear the setup_complete flag on next boot (resets the setup wizard).
      # Remove or set back to "false" after the setup is done to prevent repeated resets.
      EMDASH_RESET_SETUP: "${EMDASH_RESET_SETUP:-false}"
    volumes:
      # SQLite database — persisted across container restarts/redeploys
      - emdash-data:/app/data
      # User-uploaded media files
      - emdash-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').createConnection(4321,'localhost').on('connect',function(){process.exit(0)}).on('error',function(){process.exit(1)})"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  emdash-data:
  emdash-uploads:
