name: Bot orchestrate

# The state-machine BRAIN. One event-driven workflow that owns every issue-side
# transition, replacing the orchestration logic previously spread across
# investigate.yml, reporter-reply.yml, and maintainer-reply.yml. It is
# deterministic where it can be (the router in .github/bot/router.cjs) and only
# calls a Flue classifier for the genuinely fuzzy events (a reporter's free-text
# reply, a maintainer's free-text directive).
#
# Flow per event:
#   1. route   -- normalize the event, resolve the actor role, read live labels,
#                 and decide the machine event. Explicit `@emdashbot <verb>` and
#                 label triggers are deterministic; a free-text reply in
#                 awaiting-feedback / blocked needs a classifier (step 2).
#   2. classify-- (conditional) run the cheap Flue classifier to turn a free-text
#                 reply into an event.
#   3. apply   -- resolve(state,event) -> flip the single state label, post the
#                 self-documenting comment, and emit a dispatch payload / open a
#                 PR for the transition's action.
#   4. dispatch-- (conditional) repository_dispatch the heavy agent run to the
#                 executor (investigate-run.yml); the runner has the toolchain.
#
# Gated behind the BOT_STATE_MACHINE_V2 repo variable so it is inert until the
# bot:* label taxonomy is live and the legacy workflows are retired (see
# .github/bot/README.md cutover plan).

on:
  issues:
    types: [opened, reopened, labeled]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [closed]
  workflow_dispatch:

# Default-deny; the job elevates only what it needs.
permissions:
  contents: read

concurrency:
  # Serialize per issue so rapid transitions don't race on the label set.
  group: orchestrate-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  orchestrate:
    name: Route and apply
    if: vars.BOT_STATE_MACHINE_V2 == '1' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout (router + bot project)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: emdash-cms
          repositories: emdash

      # --- 1. route: decide the machine event deterministically where possible ---
      - name: Route event
        id: route
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const router = require('./.github/bot/router.cjs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ev = context.eventName;

            // Resolve the anchoring issue and a normalized event.
            let issueNumber, prNumber = null, body = '', actorLogin = '', kind = 'event';
            if (ev === 'issues') {
              issueNumber = context.payload.issue.number;
              actorLogin = context.payload.sender.login;
              kind = context.payload.action; // opened|reopened|labeled
            } else if (ev === 'issue_comment') {
              actorLogin = context.payload.comment.user.login;
              body = context.payload.comment.body || '';
              if (context.payload.issue.pull_request) {
                // Comment on a PR: only act on bot PRs (head branch bot/fix-<n>).
                const prNum = context.payload.issue.number;
                const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNum });
                const m = /^bot\/fix-(\d+)$/.exec(pr.head.ref || '');
                if (!m) { core.setOutput('skip', 'not-a-bot-pr'); return; }
                issueNumber = Number(m[1]);
                prNumber = prNum;
                kind = 'pr_comment';
              } else {
                issueNumber = context.payload.issue.number;
                kind = 'issue_comment';
              }
            } else if (ev === 'pull_request_target' && context.payload.action === 'closed') {
              const pr = context.payload.pull_request;
              const m = /^bot\/fix-(\d+)$/.exec(pr.head.ref || '');
              if (!m || !pr.merged) { core.setOutput('skip', 'not-a-merged-bot-pr'); return; }
              issueNumber = Number(m[1]);
              prNumber = pr.number;
              kind = 'pr_merged';
            } else { core.setOutput('skip', 'unhandled-event'); return; }

            // Live labels (authoritative, never the event snapshot).
            const { data: issue } = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
            const labels = issue.labels.map((l) => (typeof l === 'string' ? l : l.name));

            // Actor role: maintainer (live write/triage/admin), reporter, or other.
            let role = 'other';
            if (actorLogin === issue.user.login) role = 'reporter';
            try {
              const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({ owner, repo, username: actorLogin });
              if (['admin', 'write', 'maintain'].includes(perm.permission) ||
                  ['admin', 'write', 'triage', 'maintain'].includes(perm.role_name || '')) role = 'maintainer';
            } catch { /* not a collaborator */ }

            const state = router.currentState(labels);
            const out = { issueNumber, prNumber, role, state, labels, actorLogin, body };

            // pr_merged is a system event, not a command.
            if (kind === 'pr_merged') {
              core.setOutput('payload', JSON.stringify({ ...out, event: 'pr.merged', actor: 'system' }));
              return;
            }
            // Label triggers (bot:repro / bot:implement) on the labeled event.
            if (kind === 'labeled') {
              const added = context.payload.label && context.payload.label.name;
              const map = { 'bot:repro': 'repro', 'bot:implement': 'implement' };
              if (map[added]) { core.setOutput('payload', JSON.stringify({ ...out, event: map[added], actor: role })); return; }
              core.setOutput('skip', 'label-not-a-trigger'); return;
            }
            if (kind === 'opened' || kind === 'reopened') { core.setOutput('skip', 'no-command-on-open'); return; }

            // One call resolves the comment: an exact bare verb -> deterministic
            // transition (incl. destructive ones); bot-PR free text -> revise;
            // any other free text -> hand to the intent classifier, constrained
            // to this state's non-destructive commands. The `@emdashbot` mention
            // is required (resolveComment returns noop otherwise).
            const isBotPr = prNumber != null;
            const decision = router.resolveComment({ labels, body, actor: role, allowDefault: isBotPr });
            if (decision.kind === 'transition') {
              core.setOutput('payload', JSON.stringify({ ...out, event: decision.event, arg: decision.arg || null, actor: role }));
              return;
            }
            if (decision.kind === 'readonly') {
              core.setOutput('payload', JSON.stringify({ ...out, event: decision.event, actor: role }));
              return;
            }
            if (decision.kind === 'classify') {
              // The classifier needs the bot's last message to resolve references
              // like "go with option A".
              let botContext = '';
              try {
                const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: issueNumber, per_page: 100 });
                const botComments = comments.filter((c) => c.user && c.user.type === 'Bot');
                if (botComments.length) botContext = botComments[botComments.length - 1].body || '';
              } catch { /* best effort */ }
              core.setOutput('classify', 'command');
              core.setOutput('payload', JSON.stringify({ ...out, classify: { state: decision.state, commands: decision.commands, text: decision.text }, botContext }));
              return;
            }
            core.setOutput('skip', decision.reason || 'no-op');

      # --- 2. classify (conditional): free-text reply -> event via Flue ---
      - name: Setup Node
        if: steps.route.outputs.classify
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install pnpm
        if: steps.route.outputs.classify
        run: npm i -g pnpm@11.1.3

      - name: Build classifier (.flue)
        if: steps.route.outputs.classify
        working-directory: .flue
        run: |
          pnpm install --frozen-lockfile=false
          pnpm exec flue build --target node --output .build

      - name: Run command classifier
        id: classify
        if: steps.route.outputs.classify
        working-directory: .flue
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_GATEWAY_ID: ${{ secrets.CLOUDFLARE_GATEWAY_ID }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          PAYLOAD: ${{ steps.route.outputs.payload }}
        run: |
          # Build the state-aware classifier input from the routed payload (the
          # candidate commands were chosen by the router; the comment text and
          # bot context travel as JSON, never interpolated into the command line).
          jq '{issueNumber: .issueNumber, state: .classify.state, comment: .classify.text,
               botContext: (.botContext // ""), commands: .classify.commands}' \
            <<<"$PAYLOAD" > /tmp/classify-input.json
          CLASSIFY_RESULT_PATH=/tmp/classify-result.json \
            pnpm exec flue run classify-command --target node --input "$(cat /tmp/classify-input.json)" || true
          # classify-command returns a machine event directly (or "none").
          echo "event=$(jq -r '.event // "none"' /tmp/classify-result.json 2>/dev/null || echo none)" >> "$GITHUB_OUTPUT"
          echo "arg=$(jq -r '.arg // ""' /tmp/classify-result.json 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

      # --- 3 + 4. apply the decision and dispatch the agent run if needed ---
      - name: Apply decision
        if: steps.route.outputs.payload && !steps.route.outputs.skip
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const router = require('./.github/bot/router.cjs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const p = JSON.parse(process.env.PAYLOAD);

            // Resolve the event: either a deterministic one set in step 1, or the
            // machine event the classifier returned directly (it picks from the
            // state's candidate commands, so no sub-vocabulary mapping is needed).
            let event = p.event;
            let arg = p.arg || null;
            const clsEvent = process.env.CLASS_EVENT;
            if (!event && clsEvent && clsEvent !== 'none') {
              event = clsEvent;
              if (process.env.CLASS_ARG) arg = process.env.CLASS_ARG;
            }
            if (!event) {
              core.info(`no event resolved (classifier=${clsEvent || 'n/a'}); leaving issue untouched`);
              return;
            }

            const decision = router.resolve({ labels: p.labels, event, arg, actor: p.actor });
            if (decision.kind === 'readonly') {
              await github.rest.issues.createComment({ owner, repo, issue_number: p.issueNumber,
                body: `Current state: \`${decision.state}\`.` + router.replyFooter(decision.state) });
              return;
            }
            if (decision.kind !== 'transition') { core.info(`no-op: ${decision.reason}`); return; }

            // Flip the single state label (projection of the machine state).
            const toAdd = decision.addLabel;
            await github.rest.issues.addLabels({ owner, repo, issue_number: p.issueNumber, labels: [toAdd] });
            for (const l of decision.removeLabels) {
              if (p.labels.includes(l)) {
                await github.rest.issues.removeLabel({ owner, repo, issue_number: p.issueNumber, name: l }).catch(() => {});
              }
            }

            // Action side effects.
            if (decision.action === 'openPr' && decision.to === 'in_review') {
              await github.rest.pulls.create({ owner, repo, title: `fix: address #${p.issueNumber}`,
                head: `bot/fix-${p.issueNumber}`, base: 'main',
                body: `Automated fix for #${p.issueNumber}. Reply \`@emdashbot <feedback>\` to revise.` }).catch((e) => core.warning(`PR create: ${e.message}`));
            }
            if (decision.action === 'closePr' && p.prNumber) {
              await github.rest.pulls.update({ owner, repo, pull_number: p.prNumber, state: 'closed' }).catch(() => {});
            }

            // Dispatch the heavy agent run to the executor backend.
            if (decision.action && decision.action.startsWith('investigate.')) {
              const mode = decision.action.split('.')[1]; // repro | implement | revise
              await github.rest.repos.createDispatchEvent({ owner, repo, event_type: 'investigate-run',
                client_payload: { issueNumber: p.issueNumber, mode, directive: arg || null, prNumber: p.prNumber || null } });
            }

            await github.rest.issues.createComment({ owner, repo, issue_number: p.issueNumber,
              body: `Moving to \`${decision.to}\`.` + router.replyFooter(decision.to) });
        env:
          PAYLOAD: ${{ steps.route.outputs.payload }}
          CLASS_EVENT: ${{ steps.classify.outputs.event }}
          CLASS_ARG: ${{ steps.classify.outputs.arg }}
