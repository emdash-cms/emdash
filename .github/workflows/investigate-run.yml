name: Bot investigate run

# The EXECUTOR backend. The orchestrator (orchestrate.yml) dispatches here when a
# transition's action is investigate.* (repro / implement / revise). This is the
# only environment with the toolchain the agent needs (pnpm, git, a real browser
# via agent-browser, the ability to boot `pnpm dev` and run tests), which is why
# the heavy work stays on a GitHub Actions runner rather than a CF isolate.
#
# Contract (client_payload from createDispatchEvent in orchestrate.yml):
#   { issueNumber, mode: "repro"|"implement"|"revise", directive?, prNumber? }
#
# Responsibilities:
#   - run the Flue investigate workflow (read-only on GitHub; AGENT_GH_TOKEN)
#   - push bot/fix-<n> when the agent staged a fix (app token, never the agent's)
#   - map the result to an agent.* event (router.outcomeFromResult) and apply the
#     resulting transition (label flip + comment) so the issue advances
#
# The agent process only ever sees the read-only AGENT_GH_TOKEN; every write
# (branch push, labels, comment) uses the app token in trusted YAML steps.

on:
  repository_dispatch:
    types: [investigate-run]
  workflow_dispatch:
    inputs:
      issueNumber: { description: "Issue number", required: true, type: string }
      mode: { description: "repro | implement | revise", required: true, type: string }
      directive: { description: "Maintainer directive (implement)", required: false, type: string }

permissions:
  contents: read

concurrency:
  group: investigate-run-${{ github.event.client_payload.issueNumber || github.event.inputs.issueNumber }}
  cancel-in-progress: false

jobs:
  run:
    name: Investigate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    env:
      ISSUE_NUMBER: ${{ github.event.client_payload.issueNumber || github.event.inputs.issueNumber }}
      MODE: ${{ github.event.client_payload.mode || github.event.inputs.mode }}
      DIRECTIVE: ${{ github.event.client_payload.directive || github.event.inputs.directive }}
      PR_NUMBER: ${{ github.event.client_payload.prNumber }}
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: emdash-cms
          repositories: emdash
          # Executor scopes: contents:write so we can push bot/fix-<n>, plus
          # the read/write surfaces needed for the result-application step.
          permission-contents: write
          permission-metadata: read
          permission-issues: write
          permission-pull-requests: write

      # For revise, check out the existing bot/fix-<n> so the agent updates it;
      # otherwise check out main. NB: persist-credentials:false is load-bearing.
      # If we leave the app token in .git/config, the agent process (running in
      # this same workspace) can read it and exfiltrate or push with it. The
      # trusted push step below installs the token *into the remote URL only*
      # for the duration of one `git push`, and unconfigures it afterwards.
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ env.MODE == 'revise' && format('bot/fix-{0}', env.ISSUE_NUMBER) || '' }}

      # Runner provisioning matches the legacy investigate.yml so the agent
      # sandbox has the same tooling (pnpm, root deps, package builds, the
      # browser stack the repro-admin/repro-public skills drive via bgproc +
      # agent-browser). These are carried over verbatim from investigate.yml.
      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: "package.json"
          cache: "pnpm"

      # The repro-admin/repro-public skills drive a real browser via `bgproc`
      # (boots `pnpm dev`) and `agent-browser`. PATH is inherited by the
      # agent's local() sandbox, so these land on the agent's bash PATH.
      - name: Install browser automation tools
        run: |
          npm install -g bgproc agent-browser
          agent-browser install

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Flue agent dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .flue

      - name: Build packages
        run: pnpm build

      - name: Build agent (.flue)
        working-directory: .flue
        run: pnpm exec flue build --target node --output .build

      - name: Fetch issue
        id: issue
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
            });
            // Write to files; never interpolate issue text into a shell line.
            const fs = require('node:fs');
            fs.writeFileSync('/tmp/issue-title.txt', issue.title || '');
            fs.writeFileSync('/tmp/issue-body.txt', issue.body || '');

      - name: Run investigate
        id: investigate
        working-directory: .flue
        env:
          # Read-only token for the agent's sandbox: it can read; it cannot push
          # or comment. Every write below uses the app token instead.
          AGENT_GH_TOKEN: ${{ secrets.AGENT_GH_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_GATEWAY_ID: ${{ secrets.CLOUDFLARE_GATEWAY_ID }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          TITLE="$(cat /tmp/issue-title.txt)"
          # Build the input via jq from files; directive/retryContext keyed by mode.
          jq -n \
            --argjson n "$ISSUE_NUMBER" \
            --arg t "$TITLE" \
            --rawfile b /tmp/issue-body.txt \
            --arg mode "$MODE" \
            --arg d "$DIRECTIVE" \
            '{issueNumber:$n, issueTitle:$t, issueBody:$b, owner:"emdash-cms", repo:"emdash"}
             + (if $mode=="implement" and $d!="" then {maintainerDirective:$d}
                elif $mode=="revise" and $d!="" then {retryContext:$d} else {} end)' \
            > /tmp/inv-input.json
          INVESTIGATE_RESULT_PATH=/tmp/inv-result.json \
            pnpm exec flue run investigate --target node --input "$(cat /tmp/inv-input.json)" \
            && echo "ok=true" >> "$GITHUB_OUTPUT" || echo "ok=false" >> "$GITHUB_OUTPUT"

      # Kill any background processes the agent spawned (bgproc'd `pnpm dev`,
      # agent-browser children, model-driven shells) BEFORE we touch a write
      # token. If we left them running, a prompt-injected agent could leave a
      # `ps -eo args` scraper that snags the token from argv during push.
      # Hard match on $GITHUB_WORKSPACE so we don't touch GitHub Actions
      # infrastructure processes.
      - name: Contain agent processes
        if: always()
        run: |
          # First a polite SIGTERM, then SIGKILL to anything still alive.
          pgrep -f "^.*${GITHUB_WORKSPACE}.*$" 2>/dev/null | xargs -r kill -TERM 2>/dev/null || true
          sleep 2
          pgrep -f "^.*${GITHUB_WORKSPACE}.*$" 2>/dev/null | xargs -r kill -KILL 2>/dev/null || true
          # Also kill anything still bound to the dev-server's typical ports
          # (the repro skills boot `pnpm dev` which holds 4321 / 8788).
          for port in 4321 8788 3583; do
            lsof -ti:$port 2>/dev/null | xargs -r kill -KILL 2>/dev/null || true
          done

      - name: Push fix branch (if any)
        id: push
        if: steps.investigate.outputs.ok == 'true'
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          FIXED="$(jq -r '.fixed // false' /tmp/inv-result.json 2>/dev/null || echo false)"
          if [ "$FIXED" != "true" ]; then echo "pushed=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          BRANCH="bot/fix-${ISSUE_NUMBER}"

          # --- guard: refuse to clobber human commits on an existing bot/fix-<n>
          # `--force-with-lease` only protects against changes AFTER our fetch.
          # If a maintainer pushed a rescue commit BEFORE we ran, fetch sees it
          # and lease lets us overwrite it. Inspect the remote tip and bail
          # unless every commit not on main was authored by emdashbot[bot].
          REMOTE_TIP="$(git -c http.extraheader= ls-remote --heads origin "$BRANCH" 2>/dev/null | awk '{print $1}')"
          if [ -n "$REMOTE_TIP" ]; then
            git fetch --no-tags origin "$BRANCH" || true
            NON_BOT="$(git log --format='%H %an' "origin/main..$REMOTE_TIP" 2>/dev/null \
              | awk '$2 != "emdashbot[bot]" { print $1 }' | head -1)"
            if [ -n "$NON_BOT" ]; then
              echo "::warning::refusing to overwrite human commit $NON_BOT on $BRANCH"
              echo "pushed=false" >> "$GITHUB_OUTPUT"
              echo "reason=human-commits-on-branch" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Write the model-produced commit message to a file and pass via -F.
          # `git commit -m "$MSG"` would expand backticks / $(...) under shell
          # rules; an attacker-influenced issue body could land RCE on the runner.
          jq -r --arg fallback "fix: address #${ISSUE_NUMBER}" '.commitMessage // $fallback' \
            /tmp/inv-result.json > /tmp/commit-msg.txt
          git config user.name "emdashbot[bot]"
          git config user.email "emdashbot[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add -A
          # A nothing-staged commit failure is "no diff": pushed=false, no error.
          if ! git commit -F /tmp/commit-msg.txt; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "reason=no-diff-to-commit" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Push with the token in an env var, not on argv. `GIT_ASKPASS` runs
          # a helper that reads APP_TOKEN from this step's env and prints it as
          # the credential. argv has no secret; /proc/<pid>/cmdline shows only
          # `git push --force-with-lease origin bot/fix-N`.
          ASKPASS=/tmp/git-askpass.sh
          cat > "$ASKPASS" <<'EOF'
          #!/usr/bin/env bash
          # GIT_ASKPASS protocol: prompt arrives on argv. For username prompts
          # we return the conventional `x-access-token`; for password prompts
          # we return the token from APP_TOKEN.
          case "$1" in
            Username*) echo "x-access-token" ;;
            Password*) echo "${APP_TOKEN}" ;;
          esac
          EOF
          chmod 700 "$ASKPASS"
          export GIT_ASKPASS="$ASKPASS"
          # Disable git's credential helpers so they can't override the askpass.
          if GIT_TERMINAL_PROMPT=0 git -c credential.helper= -c core.askpass="$ASKPASS" \
              push --force-with-lease origin "$BRANCH"; then
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "reason=push-failed" >> "$GITHUB_OUTPUT"
          fi
          rm -f "$ASKPASS"

      - name: Apply result to the machine
        if: always() && env.ISSUE_NUMBER != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require('node:fs');
            const router = require('./.github/bot/router.cjs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const ok = process.env.INV_OK === 'true';

            let result = null;
            try { result = JSON.parse(fs.readFileSync('/tmp/inv-result.json', 'utf8')); } catch { /* failed run */ }
            const pushed = process.env.PUSHED === 'true';
            const event = router.outcomeFromResult({ ok, result, pushed });

            const { data: issue } = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
            const labels = issue.labels.map((l) => (typeof l === 'string' ? l : l.name));
            const decision = router.resolve({ labels, event, actor: 'system' });
            if (decision.kind !== 'transition') { core.info(`no transition for ${event}; leaving as-is`); return; }

            await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: decision.addLabels });
            for (const l of decision.removeLabels) {
              if (labels.includes(l)) await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: l }).catch(() => {});
            }

            // Compose the comment from the agent's own notes when present.
            const notes = result && (result.notes || result.reason || result.attempts);
            const ask = decision.to === 'awaiting_feedback'
              ? "\n\nA fix is on `bot/fix-" + issueNumber + "`. Reporter: does this resolve it? Reply `@emdashbot confirm` or `@emdashbot reject`."
              : "";
            await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber,
              body: (notes ? String(notes) : `Run complete (\`${event}\`).`) + ask + router.replyFooter(decision.to) });
        env:
          INV_OK: ${{ steps.investigate.outputs.ok }}
          PUSHED: ${{ steps.push.outputs.pushed }}
